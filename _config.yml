title: YoungSeong Kim
email: ""
description: >-
  Independent AI researcher. RL lover & DL theory lover.
baseurl: ""
url: "https://kim-ai-gpu.github.io"
github_username: Kim-Ai-gpu

# Build settings
theme: minima
minima:
  skin: dark

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Permalink
permalink: /:year/:month/:day/:title/

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - README.md
